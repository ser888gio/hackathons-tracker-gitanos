<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hackathons Tracker</title>
    <link rel="stylesheet" href="/static/styles.css?v=9" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Devpost winners</p>
          <h1>Hackathons Tracker</h1>
        </div>
        <div class="actions">
          <a class="secondary-button" href="/add">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z" />
            </svg>
            <span>Add project</span>
          </a>
          <button id="refreshButton" class="icon-button" type="button" title="Refresh projects" aria-label="Refresh projects">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 12a8 8 0 0 1-13.7 5.6l-1.8 1.8V14h5.4l-2.1 2.1A5.8 5.8 0 0 0 17.8 12h2.2ZM4 12A8 8 0 0 1 17.7 6.4l1.8-1.8V10h-5.4l2.1-2.1A5.8 5.8 0 0 0 6.2 12H4Z" />
            </svg>
          </button>
          <button id="pipelineButton" class="primary-button" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 5.1v13.8L18.8 12 8 5.1Z" />
            </svg>
            <span>Run pipeline</span>
          </button>
        </div>
      </header>

      <section class="scraper-panel" aria-label="Scraper status">
        <div class="scraper-panel__stat">
          <span class="scraper-panel__label">Max projects</span>
          <span class="scraper-panel__value" id="statMaxProjects">—</span>
        </div>
        <div class="scraper-panel__stat">
          <span class="scraper-panel__label">Pages scraped</span>
          <span class="scraper-panel__value" id="statPages">—</span>
        </div>
        <div class="scraper-panel__stat">
          <span class="scraper-panel__label">Projects scraped</span>
          <span class="scraper-panel__value" id="statScraped">—</span>
        </div>
        <div class="scraper-panel__stat scraper-panel__stat--state">
          <span class="scraper-panel__label">Scraper state</span>
          <span class="scraper-panel__value" id="statState">—</span>
        </div>
      </section>

      <section class="toolbar" aria-label="Project filters">
        <label class="field field--search">
          <span>Search</span>
          <input id="searchFilter" type="search" placeholder="Name, hackathon, stack, feedback" autocomplete="off" />
        </label>
        <label class="field">
          <span>Category</span>
          <select id="categoryFilter">
            <option value="">All</option>
            <option value="defense">Defense</option>
            <option value="health">Health</option>
            <option value="education">Education</option>
            <option value="environment">Environment</option>
            <option value="finance">Finance</option>
            <option value="social">Social</option>
            <option value="productivity">Productivity</option>
            <option value="other">Other</option>
          </select>
        </label>
        <label class="field">
          <span>Hackathon</span>
          <select id="hackathonFilter">
            <option value="">All hackathons</option>
          </select>
        </label>
        <label class="field">
          <span>Source</span>
          <select id="sourceFilter">
            <option value="">All sources</option>
            <option value="Devpost">Devpost</option>
            <option value="Manual">Manual</option>
          </select>
        </label>
        <label class="field">
          <span>Sort</span>
          <select id="sortFilter">
            <option value="newest">Newest scraped</option>
            <option value="rating-desc">Rating high to low</option>
            <option value="rating-asc">Rating low to high</option>
            <option value="project-asc">Project name</option>
            <option value="hackathon-asc">Hackathon name</option>
          </select>
        </label>
        <div class="rating-controls" aria-label="Rating filters">
          <span class="control-label">Rating</span>
          <div class="rating-range">
            <label class="mini-field">
              <span>Min</span>
              <input id="minRatingFilter" type="number" min="0" max="10" step="1" value="0" />
            </label>
            <label class="mini-field">
              <span>Max</span>
              <input id="maxRatingFilter" type="number" min="0" max="10" step="1" value="10" />
            </label>
          </div>
          <div class="segmented" aria-label="Rating presets">
            <button class="segmented__button is-active" type="button" data-rating-preset="all">All</button>
            <button class="segmented__button" type="button" data-rating-preset="8">8+</button>
            <button class="segmented__button" type="button" data-rating-preset="6">6+</button>
            <button class="segmented__button" type="button" data-rating-preset="pending">Pending</button>
          </div>
        </div>
        <div class="toggle-group" aria-label="Link filters">
          <span class="control-label">Links</span>
          <label class="toggle">
            <input id="githubFilter" type="checkbox" />
            <span>GitHub</span>
          </label>
          <label class="toggle">
            <input id="demoFilter" type="checkbox" />
            <span>Demo</span>
          </label>
        </div>
        <div class="tech-filter">
          <div class="tech-filter__header">
            <span class="control-label">Tech stack</span>
            <button id="clearTechFilter" class="text-button" type="button">Clear</button>
          </div>
          <div class="tech-select">
            <button
              id="techDropdownButton"
              class="tech-select__button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span id="techDropdownLabel">All tech stacks</span>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m7 10 5 5 5-5H7Z" />
              </svg>
            </button>
            <div id="techStackFilter" class="tech-menu" role="listbox" aria-label="Tech stack filters"></div>
          </div>
        </div>
        <div class="toolbar__footer">
          <div class="summary" id="summary">Loading...</div>
          <button id="resetFilters" class="secondary-button secondary-button--compact" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 5a7 7 0 1 1-6.4 9.8l1.8-.9A5 5 0 1 0 7 12h3L6 8 2 12h3a7 7 0 0 1 7-7Z" />
            </svg>
            <span>Reset filters</span>
          </button>
        </div>
      </section>

      <section id="status" class="status" hidden></section>
      <section id="projectGrid" class="project-grid" aria-live="polite"></section>
    </main>

    <template id="projectTemplate">
      <article class="project-card">
        <div class="project-card__header">
          <div>
            <p class="category"></p>
            <h2></h2>
          </div>
          <div class="project-card__actions">
            <div class="score" title="LLM rating"></div>
            <button class="delete-project icon-button" type="button" title="Delete project" aria-label="Delete project">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-1 6h2v10H8V9Zm6 0h2v10h-2V9Zm-3 0h2v10h-2V9Zm-4 12h10l1-13H6l1 13Z" />
              </svg>
            </button>
          </div>
        </div>
        <p class="description"></p>
        <div class="stack" aria-label="Tech stack"></div>
        <div class="project-links"></div>
        <dl class="evaluation">
          <div>
            <dt>Pros</dt>
            <dd class="pros"></dd>
          </div>
          <div>
            <dt>Improvements</dt>
            <dd class="improvements"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="/static/app.js?v=9" defer></script>
  </body>
</html>
