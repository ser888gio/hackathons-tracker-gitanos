<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Project | Hackathons Tracker</title>
    <link rel="stylesheet" href="/static/styles.css?v=7" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Manual entry</p>
          <h1>Add Project</h1>
        </div>
        <div class="actions">
          <a class="secondary-button" href="/">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 11v2H8.8l4.6 4.6L12 19 5 12l7-7 1.4 1.4L8.8 11H20Z" />
            </svg>
            <span>Projects</span>
          </a>
        </div>
      </header>

      <section id="addStatus" class="status" hidden></section>

      <form id="projectForm" class="manual-form">
        <label class="field">
          <span>Project name</span>
          <input id="projectName" name="project_name" type="text" maxlength="255" required />
        </label>

        <label class="field">
          <span>Hackathon name</span>
          <input id="hackathonName" name="hackathon_name" type="text" maxlength="255" required />
        </label>

        <label class="field">
          <span>Category</span>
          <select id="projectCategory" name="category">
            <option value="other">Other</option>
            <option value="defense">Defense</option>
            <option value="health">Health</option>
            <option value="education">Education</option>
            <option value="environment">Environment</option>
            <option value="finance">Finance</option>
            <option value="social">Social</option>
            <option value="productivity">Productivity</option>
          </select>
        </label>

        <label class="field field--wide">
          <span>Description</span>
          <textarea id="projectDescription" name="description" rows="9" required></textarea>
        </label>

        <label class="field field--wide">
          <span>Tech stack</span>
          <input id="projectTechStack" name="tech_stack" type="text" placeholder="React, FastAPI, PostgreSQL" />
        </label>

        <label class="field">
          <span>Project URL</span>
          <input id="projectUrl" name="project_url" type="url" />
        </label>

        <label class="field">
          <span>GitHub URL</span>
          <input id="projectGithub" name="github_url" type="url" />
        </label>

        <div class="form-actions field--wide">
          <button id="submitProject" class="primary-button" type="submit">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3 4 7v6c0 4.4 3.3 7.8 8 8 4.7-.2 8-3.6 8-8V7l-8-4Zm-1 13-4-4 1.4-1.4L11 13.2l5.6-5.6L18 9l-7 7Z" />
            </svg>
            <span>Add and rate</span>
          </button>
        </div>
      </form>

      <section id="createdProject" class="created-project" aria-live="polite"></section>
    </main>

    <template id="projectTemplate">
      <article class="project-card">
        <div class="project-card__header">
          <div>
            <p class="category"></p>
            <h2></h2>
          </div>
          <div class="score" title="LLM rating"></div>
        </div>
        <p class="description"></p>
        <div class="stack" aria-label="Tech stack"></div>
        <div class="project-links"></div>
        <dl class="evaluation">
          <div>
            <dt>Pros</dt>
            <dd class="pros"></dd>
          </div>
          <div>
            <dt>Improvements</dt>
            <dd class="improvements"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="/static/add.js?v=7" defer></script>
  </body>
</html>
